{% extends 'apps/base.html' %}
{% load static %}

{% block title %}Add Exam{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="fas fa-plus-circle"></i> Add New Exam</h4>
                </div>
                <div class="card-body">
                    <form method="post" id="examForm">
                        {% csrf_token %}
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="name" class="form-label">Exam Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="name" name="name" required>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="exam_type" class="form-label">Exam Type <span class="text-danger">*</span></label>
                                <select class="form-select" id="exam_type" name="exam_type" required>
                                    <option value="">Select Exam Type</option>
                                    <option value="UT1">Unit Test 1</option>
                                    <option value="UT2">Unit Test 2</option>
                                    <option value="QUARTERLY">Quarterly</option>
                                    <option value="HALF_YEARLY">Half Yearly</option>
                                    <option value="ANNUAL">Annual</option>
                                </select>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="class_grade" class="form-label">Class <span class="text-danger">*</span></label>
                                <select class="form-select" id="class_grade" name="class_grade" required>
                                    <option value="">Select Class</option>
                                    {% for class in classes %}
                                    <option value="{{ class.id }}">{{ class }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="subject" class="form-label">Subject <span class="text-danger">*</span></label>
                                <select class="form-select" id="subject" name="subject" required>
                                    <option value="">Select Subject</option>
                                    {% for subject in subjects %}
                                    <option value="{{ subject.id }}">{{ subject.name }} ({{ subject.code }})</option>
                                    {% endfor %}
                                </select>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="exam_date" class="form-label">Exam Date <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" id="exam_date" name="exam_date" required>
                            </div>
                            
                            <div class="col-md-3 mb-3">
                                <label for="start_time" class="form-label">Start Time <span class="text-danger">*</span></label>
                                <input type="time" class="form-control" id="start_time" name="start_time" required>
                            </div>
                            
                            <div class="col-md-3 mb-3">
                                <label for="end_time" class="form-label">End Time <span class="text-danger">*</span></label>
                                <input type="time" class="form-control" id="end_time" name="end_time" required>
                            </div>
                            
                            <div class="col-md-4 mb-3">
                                <label for="total_marks" class="form-label">Total Marks <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="total_marks" name="total_marks" min="1" value="100" required>
                            </div>
                            
                            <div class="col-md-4 mb-3">
                                <label for="passing_marks" class="form-label">Passing Marks <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="passing_marks" name="passing_marks" min="1" value="35" required>
                            </div>
                            
                            <div class="col-md-4 mb-3">
                                <label for="academic_year" class="form-label">Academic Year</label>
                                <input type="text" class="form-control" id="academic_year" name="academic_year" value="2024-2025">
                            </div>
                        </div>
                        
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                            <a href="{% url 'exam_list' %}" class="btn btn-secondary me-md-2">
                                <i class="fas fa-times"></i> Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Save Exam
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Auto-calculate passing marks when total marks changes
document.getElementById('total_marks').addEventListener('input', function() {
    let total = parseInt(this.value) || 0;
    let passing = Math.round(total * 0.35);
    document.getElementById('passing_marks').value = passing;
});

// Set minimum date to today
document.addEventListener('DOMContentLoaded', function() {
    let today = new Date().toISOString().split('T')[0];
    document.getElementById('exam_date').setAttribute('min', today);
});
</script>
{% endblock %}
