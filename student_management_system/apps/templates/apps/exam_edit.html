{% extends 'apps/base.html' %}
{% load static %}

{% block title %}Edit Exam{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="fas fa-edit"></i> Edit Exam</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="name" class="form-label">Exam Name</label>
                                <input type="text" class="form-control" id="name" name="name" value="{{ exam.name }}" required>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="exam_type" class="form-label">Exam Type</label>
                                <select class="form-select" id="exam_type" name="exam_type" required>
                                    <option value="">Select Exam Type</option>
                                    <option value="UT1" {% if exam.exam_type == 'UT1' %}selected{% endif %}>Unit Test 1</option>
                                    <option value="UT2" {% if exam.exam_type == 'UT2' %}selected{% endif %}>Unit Test 2</option>
                                    <option value="QUARTERLY" {% if exam.exam_type == 'QUARTERLY' %}selected{% endif %}>Quarterly</option>
                                    <option value="HALF_YEARLY" {% if exam.exam_type == 'HALF_YEARLY' %}selected{% endif %}>Half Yearly</option>
                                    <option value="ANNUAL" {% if exam.exam_type == 'ANNUAL' %}selected{% endif %}>Annual</option>
                                </select>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="class_grade" class="form-label">Class</label>
                                <select class="form-select" id="class_grade" name="class_grade" required>
                                    <option value="">Select Class</option>
                                    {% for class in classes %}
                                    <option value="{{ class.id }}" {% if exam.class_grade.id == class.id %}selected{% endif %}>{{ class }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="subject" class="form-label">Subject</label>
                                <select class="form-select" id="subject" name="subject" required>
                                    <option value="">Select Subject</option>
                                    {% for subject in subjects %}
                                    <option value="{{ subject.id }}" {% if exam.subject.id == subject.id %}selected{% endif %}>{{ subject.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="exam_date" class="form-label">Exam Date</label>
                                <input type="date" class="form-control" id="exam_date" name="exam_date" value="{{ exam.exam_date|date:'Y-m-d' }}" required>
                            </div>
                            
                            <div class="col-md-3 mb-3">
                                <label for="start_time" class="form-label">Start Time</label>
                                <input type="time" class="form-control" id="start_time" name="start_time" value="{{ exam.start_time|time:'H:i' }}" required>
                            </div>
                            
                            <div class="col-md-3 mb-3">
                                <label for="end_time" class="form-label">End Time</label>
                                <input type="time" class="form-control" id="end_time" name="end_time" value="{{ exam.end_time|time:'H:i' }}" required>
                            </div>
                            
                            <div class="col-md-4 mb-3">
                                <label for="total_marks" class="form-label">Total Marks</label>
                                <input type="number" class="form-control" id="total_marks" name="total_marks" value="{{ exam.total_marks }}" required>
                            </div>
                            
                            <div class="col-md-4 mb-3">
                                <label for="passing_marks" class="form-label">Passing Marks</label>
                                <input type="number" class="form-control" id="passing_marks" name="passing_marks" value="{{ exam.passing_marks }}" required>
                            </div>
                        </div>
                        
                        <div class="text-end mt-3">
                            <a href="{% url 'exam_list' %}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Update Exam</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
